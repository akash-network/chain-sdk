# yaml-language-server: $schema=../../../../go/sdl/sdl-input.schema.yaml
---
version: "2.1"
services:
  web:
    image: nginx:latest
    expose:
      - port: 80
        as: 80
        to:
          - global: true
profiles:
  compute:
    web:
      resources:
        cpu:
          units: 100m
        memory:
          size: 512Mi
        storage:
          size: 512Mi
  placement:
    akash:
      pricing:
        web:
          denom: uakt
          amount: 1000
deployment:
  web:
    akash:
      profile: web
      count: 1
reclamation:
  # Accepted by Go's time.ParseDuration (compound, 90m > 0) but rejected by the
  # stricter schema pattern (^[1-9][0-9]*(s|m|h)$). Schema-only-invalid: schema
  # rejects, Go parser accepts.
  min_window: "1h30m"
