# yaml-language-server: $schema=../../../../go/sdl/sdl-input.schema.yaml
# Edge case: minimal SDL with optional fields omitted (null/empty handling)
---
version: "2.0"
services:
  web:
    image: nginx:latest
    expose:
      - port: 80
        to:
          - global: true
profiles:
  compute:
    web:
      resources:
        cpu:
          units: 100m
        memory:
          size: 128Mi
        storage:
          size: 512Mi
  placement:
    akash:
      pricing:
        web:
          denom: uakt
          amount: 10
deployment:
  web:
    akash:
      profile: web
      count: 1
