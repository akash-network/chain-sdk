# yaml-language-server: $schema=../../../../go/sdl/sdl-input.schema.yaml
---
version: "2.1"
services:
  web:
    image: nginx:latest
    expose:
      - port: 80
        as: 80
        to:
          - global: true
profiles:
  compute:
    web:
      resources:
        cpu:
          units: 100m
        memory:
          size: 512Mi
        storage:
          size: 512Mi
  placement:
    akash:
      pricing:
        web:
          denom: uakt
          amount: 1000
deployment:
  web:
    akash:
      profile: web
      count: 1
reclamation:
  # Structurally valid (non-empty string) but semantically invalid: a window of
  # zero is rejected by the Go-parity check (min_window must be > 0).
  min_window: "0s"
