$schema: http://json-schema.org/draft-07/schema#
additionalProperties: false
description: |
  Schema for Akash Stack Definition Language (SDL) YAML input files.
  
  Note: This schema validates structure only. Semantic validations (cross-references,
  unused endpoints, profile references, etc.) are performed at runtime by the Go parser.
  See README.md for details.
properties:
  deployment:
    additionalProperties:
      additionalProperties:
        properties:
          count:
            minimum: 1
            type: integer
          profile:
            type: string
        required:
          - profile
          - count
        type: object
      type: object
    type: object
  endpoints:
    additionalProperties: false
    patternProperties:
      '^[a-z]+[-_0-9a-z]+$':
        properties:
          kind:
            enum:
              - ip
            type: string
        required:
          - kind
        type: object
    type: object
  include:
    description: Optional list of files to include
    items:
      type: string
    type: array
  profiles:
    properties:
      compute:
        additionalProperties:
          properties:
            resources:
              properties:
                cpu:
                  properties:
                    attributes:
                      type: object
                    units:
                      anyOf:
                        - type: string
                          pattern: '^-?[0-9]+(\.[0-9]+)?[a-zA-Z]*$'
                          not:
                            pattern: '^-'
                        - type: number
                          minimum: 0
                  required:
                    - units
                  type: object
                gpu:
                  properties:
                    attributes:
                      properties:
                        vendor:
                          additionalProperties: false
                          properties:
                            nvidia:
                              items:
                                properties:
                                  interface:
                                    enum:
                                      - pcie
                                      - sxm
                                    type: string
                                  model:
                                    type: string
                                  ram:
                                    type: string
                                type: object
                              type: array
                          type: object
                      type: object
                    units:
                      anyOf:
                        - type: string
                        - type: number
                  type: object
                memory:
                  properties:
                    size:
                      type: string
                  required:
                    - size
                  type: object
                storage:
                  anyOf:
                    - properties:
                        attributes:
                          allOf:
                            - if:
                                properties:
                                  class:
                                    const: ram
                                required:
                                  - class
                              then:
                                properties:
                                  persistent:
                                    anyOf:
                                      - const: false
                                      - const: "false"
                            - if:
                                properties:
                                  persistent:
                                    anyOf:
                                      - const: false
                                      - const: "false"
                                required:
                                  - persistent
                              then:
                                not:
                                  properties:
                                    class: {}
                          type: object
                        name:
                          type: string
                        size:
                          type: string
                      required:
                        - size
                      type: object
                    - items:
                        properties:
                          attributes:
                            if:
                              properties:
                                class:
                                  const: ram
                              required:
                                - class
                            then:
                              properties:
                                persistent:
                                  anyOf:
                                    - const: false
                                    - const: "false"
                            type: object
                          name:
                            type: string
                          size:
                            type: string
                        required:
                          - size
                        type: object
                      type: array
              required:
                - cpu
                - memory
                - storage
              type: object
          required:
            - resources
          type: object
        type: object
      placement:
        additionalProperties:
          properties:
            attributes:
              type: object
            pricing:
              additionalProperties:
                properties:
                  amount:
                    anyOf:
                      - type: string
                      - type: number
                  denom:
                    pattern: '^(uakt|ibc/.*)$'
                    type: string
                required:
                  - denom
                  - amount
                type: object
              type: object
            signedBy:
              properties:
                allOf:
                  items:
                    type: string
                  type: array
                anyOf:
                  items:
                    type: string
                  type: array
              type: object
          required:
            - pricing
          type: object
        type: object
    required:
      - compute
      - placement
    type: object
  services:
    additionalProperties:
      properties:
        args:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
        command:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
        credentials:
          properties:
            email:
              type: string
              minLength: 5
            host:
              type: string
              minLength: 1
            password:
              type: string
              minLength: 6
            username:
              type: string
              minLength: 1
          required:
            - host
            - username
            - password
          type: object
        dependencies:
          items:
            properties:
              service:
                type: string
            type: object
          type: array
        env:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
        expose:
          items:
            properties:
              accept:
                    items:
                      type: string
                    type: array
              as:
                maximum: 65535
                minimum: 1
                type: integer
              port:
                maximum: 65535
                minimum: 1
                type: integer
              proto:
                enum:
                  - TCP
                  - UDP
                  - tcp
                  - udp
                type: string
              to:
                items:
                  allOf:
                    - if:
                        properties:
                          ip:
                            type: string
                            minLength: 1
                        required:
                          - ip
                      then:
                        properties:
                          global:
                            const: true
                        required:
                          - global
                      type: object
                    - properties:
                        global:
                          type: boolean
                        http_options:
                          properties:
                            max_body_size:
                              type: integer
                            next_cases:
                              anyOf:
                                - type: array
                                  items:
                                    enum:
                                      - error
                                      - timeout
                                      - "500"
                                      - "502"
                                      - "503"
                                      - "504"
                                      - "403"
                                      - "404"
                                      - "429"
                                      - off
                                    type: string
                                  contains:
                                    const: off
                                  maxItems: 1
                                  minItems: 1
                                - type: array
                                  items:
                                    enum:
                                      - error
                                      - timeout
                                      - "500"
                                      - "502"
                                      - "503"
                                      - "504"
                                      - "403"
                                      - "404"
                                      - "429"
                                      - off
                                    type: string
                                  not:
                                    contains:
                                      const: off
                            next_timeout:
                              type: integer
                              minimum: 0
                            next_tries:
                              type: integer
                            read_timeout:
                              type: integer
                            send_timeout:
                              type: integer
                          type: object
                        ip:
                          minLength: 1
                          type: string
                        service:
                          type: string
                      type: object
                  type: object
                type: array
            required:
              - port
            type: object
          type: array
        image:
          type: string
          minLength: 1
        params:
          properties:
            storage:
              additionalProperties:
                properties:
                  mount:
                    type: string
                  readOnly:
                    type: boolean
                type: object
              type: object
          type: object
      required:
        - image
      type: object
    type: object
  version:
    description: SDL version
    enum:
      - '2.0'
      - '2.1'
    type: string
required:
  - version
  - deployment
title: Akash SDL Input Schema
type: object
