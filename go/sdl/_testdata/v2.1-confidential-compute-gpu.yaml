---
version: "2.1"
services:
  web:
    image: nginx
    expose:
      - port: 80
        accept:
          - ahostname.com
        to:
          - global: true
profiles:
  compute:
    web:
      resources:
        cpu:
          units: "100m"
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
              - model: h100
        memory:
          size: "128Mi"
        storage:
        - size: "1Gi"
  placement:
    westcoast:
      attributes:
        region: us-west
        confidential-compute: "true"
        confidential-compute-tee: amd-sev-snp
      pricing:
        web:
          denom: uact
          amount: 50
deployment:
  web:
    westcoast:
      profile: web
      count: 1
