---
version: "2.1"
services:
  web:
    image: nvidia-app
    expose:
      - port: 8080
        to:
          - global: true
    params:
      tee:
        type: sev-snp-gpu
profiles:
  compute:
    web:
      resources:
        cpu:
          units: "4"
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
              - model: h100
        memory:
          size: "16Gi"
        storage:
        - size: "100Gi"
  placement:
    westcoast:
      attributes:
        region: us-west
      pricing:
        web:
          denom: uact
          amount: 100
deployment:
  web:
    westcoast:
      profile: web
      count: 1
