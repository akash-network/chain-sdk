$schema: http://json-schema.org/draft-07/schema#
title: Akash Manifest Output Schema
description: |
  Schema for validating Akash manifest JSON output produced by the SDL parser.
  The manifest is an array of groups, each containing services with their
  resource allocations, expose rules, and deployment parameters.

definitions:
  resourceValue:
    description: Wrapped numeric value as string
    additionalProperties: false
    properties:
      val:
        type: string
        pattern: '^[0-9]+$'
    required:
      - val
    type: object

  keyValuePair:
    description: Key-value attribute pair
    additionalProperties: false
    properties:
      key:
        type: string
      value:
        type: string
    required:
      - key
      - value
    type: object

  cpu:
    description: CPU resource specification
    additionalProperties: false
    properties:
      units:
        $ref: '#/definitions/resourceValue'
    required:
      - units
    type: object

  memory:
    description: Memory resource specification
    additionalProperties: false
    properties:
      size:
        $ref: '#/definitions/resourceValue'
    required:
      - size
    type: object

  storageVolume:
    description: Storage volume with optional attributes
    additionalProperties: false
    properties:
      name:
        type: string
      size:
        $ref: '#/definitions/resourceValue'
      attributes:
        items:
          $ref: '#/definitions/keyValuePair'
        type: array
    required:
      - name
      - size
    type: object

  gpu:
    description: GPU resource specification with optional vendor attributes
    additionalProperties: false
    properties:
      units:
        $ref: '#/definitions/resourceValue'
      attributes:
        items:
          $ref: '#/definitions/keyValuePair'
        type: array
    required:
      - units
    type: object

  endpoint:
    description: Resource endpoint reference
    additionalProperties: false
    properties:
      kind:
        type: integer
      sequence_number:
        type: integer
        minimum: 0
    required:
      - sequence_number
    type: object

  resources:
    description: Compute resources for a service
    additionalProperties: false
    properties:
      id:
        type: integer
        minimum: 1
      cpu:
        $ref: '#/definitions/cpu'
      memory:
        $ref: '#/definitions/memory'
      storage:
        items:
          $ref: '#/definitions/storageVolume'
        type: array
      gpu:
        $ref: '#/definitions/gpu'
      endpoints:
        items:
          $ref: '#/definitions/endpoint'
        type: array
    required:
      - id
      - cpu
      - memory
      - storage
      - gpu
      - endpoints
    type: object

  httpOptions:
    description: HTTP proxy options for an exposed port
    additionalProperties: false
    properties:
      maxBodySize:
        type: integer
        minimum: 0
      readTimeout:
        type: integer
        minimum: 0
      sendTimeout:
        type: integer
        minimum: 0
      nextTries:
        type: integer
        minimum: 0
      nextTimeout:
        type: integer
        minimum: 0
      nextCases:
        items:
          type: string
        type: array
    required:
      - maxBodySize
      - readTimeout
      - sendTimeout
      - nextTries
      - nextTimeout
      - nextCases
    type: object

  expose:
    description: Service port expose configuration
    additionalProperties: false
    properties:
      port:
        type: integer
        minimum: 0
        maximum: 65535
      externalPort:
        type: integer
        minimum: 0
        maximum: 65535
      proto:
        type: string
        enum:
          - TCP
          - UDP
      service:
        type: string
      global:
        type: boolean
      hosts:
        oneOf:
          - items:
              type: string
            type: array
          - type: 'null'
      httpOptions:
        $ref: '#/definitions/httpOptions'
      ip:
        type: string
      endpointSequenceNumber:
        type: integer
        minimum: 0
    required:
      - port
      - externalPort
      - proto
      - service
      - global
      - hosts
      - httpOptions
      - ip
      - endpointSequenceNumber
    type: object

  storageParam:
    description: Storage mount parameter
    additionalProperties: false
    properties:
      name:
        type: string
      mount:
        type: string
        pattern: '^/'
      readOnly:
        type: boolean
    required:
      - name
      - mount
      - readOnly
    type: object

  serviceParams:
    description: Additional service parameters (storage mounts)
    additionalProperties: false
    properties:
      storage:
        items:
          $ref: '#/definitions/storageParam'
        type: array
    required:
      - storage
    type: object

  credentials:
    description: Container registry credentials
    oneOf:
      - additionalProperties: false
        properties:
          host:
            type: string
          email:
            type: string
          username:
            type: string
          password:
            type: string
        required:
          - host
          - username
          - password
        type: object
      - type: 'null'

  service:
    description: A service within a manifest group
    additionalProperties: false
    properties:
      name:
        type: string
      image:
        type: string
        minLength: 1
      command:
        oneOf:
          - items:
              type: string
            type: array
          - type: 'null'
      args:
        oneOf:
          - items:
              type: string
            type: array
          - type: 'null'
      env:
        oneOf:
          - items:
              type: string
            type: array
          - type: 'null'
      resources:
        $ref: '#/definitions/resources'
      count:
        type: integer
        minimum: 1
      expose:
        items:
          $ref: '#/definitions/expose'
        type: array
      params:
        $ref: '#/definitions/serviceParams'
      credentials:
        $ref: '#/definitions/credentials'
    required:
      - name
      - image
      - command
      - args
      - env
      - resources
      - count
      - expose
      - credentials
    type: object

  manifestGroup:
    description: A deployment group containing services
    additionalProperties: false
    properties:
      name:
        type: string
      services:
        items:
          $ref: '#/definitions/service'
        type: array
        minItems: 1
    required:
      - name
      - services
    type: object

items:
  $ref: '#/definitions/manifestGroup'
minItems: 1
type: array
