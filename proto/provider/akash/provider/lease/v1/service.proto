syntax = "proto3";
package akash.provider.lease.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

import "akash/manifest/v2beta3/group.proto";
import "akash/market/v1/lease.proto";

option go_package = "pkg.akt.dev/go/provider/lease/v1";

// LeaseServiceStatus
message LeaseServiceStatus {
  int32 available = 1;
  int32 total = 2;
  repeated string uris = 3;
  int64 observed_generation = 4;
  int32 replicas = 5;
  int32 updated_replicas = 6;
  int32 ready_replicas = 7;
  int32 available_replicas = 8;
}

// LeaseIPStatus
message LeaseIPStatus {
  uint32 port = 1 [
    (gogoproto.jsontag)  = "port",
    (gogoproto.moretags) = "yaml:\"port\""
  ];
  uint32 external_port = 2 [
    (gogoproto.jsontag)  = "external_port",
    (gogoproto.moretags) = "yaml:\"external_port\""
  ];
  string protocol = 3 [
    (gogoproto.jsontag)  = "protocol",
    (gogoproto.moretags) = "yaml:\"protocol\""
  ];
  string ip = 4 [
    (gogoproto.jsontag)  = "ip",
    (gogoproto.moretags) = "yaml:\"ip\""
  ];
}

// ForwarderPortStatus
message ForwarderPortStatus {
  string host = 1 [
    (gogoproto.jsontag)  = "host",
    (gogoproto.moretags) = "yaml:\"host\""
  ];
  uint32 port = 2 [
    (gogoproto.jsontag)  = "port",
    (gogoproto.moretags) = "yaml:\"port\""
  ];
  uint32 external_port = 3 [
    (gogoproto.jsontag)  = "external_port",
    (gogoproto.moretags) = "yaml:\"external_port\""
  ];
  string proto = 4 [
    (gogoproto.jsontag)  = "proto",
    (gogoproto.moretags) = "yaml:\"proto\""
  ];
  string name = 5 [
    (gogoproto.jsontag)  = "name",
    (gogoproto.moretags) = "yaml:\"name\""
  ];
}

// ServiceStatus
message ServiceStatus {
  string name = 1 [
    (gogoproto.jsontag)  = "name",
    (gogoproto.moretags) = "yaml:\"name\""
  ];
  LeaseServiceStatus status = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "status",
    (gogoproto.moretags) = "yaml:\"status\""
  ];
  repeated ForwarderPortStatus ports = 3 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "ports",
    (gogoproto.moretags) = "yaml:\"ports\""
  ];
  repeated LeaseIPStatus ips = 4 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "ip",
    (gogoproto.moretags) = "yaml:\"ip\""
  ];
}

// SendManifestRequest is request type for the SendManifest Providers RPC method
message SendManifestRequest {
  akash.market.v1.LeaseID lease_id = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "LeaseID",
    (gogoproto.moretags) = "yaml:\"LeaseID\""
  ];

  repeated akash.manifest.v2beta3.Group manifest = 2 [
    (gogoproto.castrepeated) = "pkg.akt.dev/go/manifest/v2beta3.Manifest",
    (gogoproto.nullable)     = false,
    (gogoproto.customname)   = "Manifest",
    (gogoproto.jsontag)      = "manifest",
    (gogoproto.moretags)     = "yaml:\"manifest\""
  ];
}

// SendManifestResponse is response type for the SendManifest Providers RPC method
message SendManifestResponse {}

// ServiceLogsRequest
message ServiceLogsRequest {
  akash.market.v1.LeaseID lease_id = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "LeaseID",
    (gogoproto.moretags) = "yaml:\"LeaseID\""
  ];
  repeated string services = 2 [
    (gogoproto.jsontag)  = "services",
    (gogoproto.moretags) = "yaml:\"services\""
  ];
}

// ServiceLogs
message ServiceLogs {
  string name = 1 [
    (gogoproto.jsontag)  = "name",
    (gogoproto.moretags) = "yaml:\"name\""
  ];
  bytes logs = 2 [
    (gogoproto.jsontag)  = "logs",
    (gogoproto.moretags) = "yaml:\"logs\""
  ];
}

// ServiceLogsResponse
message ServiceLogsResponse {
  repeated ServiceLogs services = 1 [
    (gogoproto.jsontag)  = "LeaseID",
    (gogoproto.moretags) = "yaml:\"LeaseID\""
  ];
}

// ShellRequest
message ShellRequest {
  akash.market.v1.LeaseID lease_id = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "LeaseID",
    (gogoproto.moretags) = "yaml:\"LeaseID\""
  ];
}

// ServiceStatusRequest
message ServiceStatusRequest {
  akash.market.v1.LeaseID lease_id = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "LeaseID",
    (gogoproto.moretags) = "yaml:\"LeaseID\""
  ];

  repeated string services = 2 [
    (gogoproto.jsontag)  = "services",
    (gogoproto.moretags) = "yaml:\"services\""
  ];
}

// ServiceStatusResponse
message ServiceStatusResponse {
  repeated ServiceStatus services = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "services",
    (gogoproto.moretags) = "yaml:\"services\""
  ];
}

// AttestationQuoteRequest is the request body for the AttestationQuote RPC method.
// The tenant generates a nonce and sends it; the provider forwards it verbatim
// to the attestation sidecar inside the confidential compute pod.
message AttestationQuoteRequest {
  akash.market.v1.LeaseID lease_id = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "LeaseID",
    (gogoproto.moretags) = "yaml:\"LeaseID\""
  ];

  // Base64-encoded 64-byte nonce generated by the tenant.
  string nonce = 2 [
    (gogoproto.jsontag)  = "nonce",
    (gogoproto.moretags) = "yaml:\"nonce\""
  ];

  // When true, report_data is computed as SHA-512(tls_pubkey || nonce)[:64]
  // to bind the attestation to the TLS channel.
  bool bind_tls = 3 [
    (gogoproto.jsontag)  = "bind_tls",
    (gogoproto.moretags) = "yaml:\"bind_tls\""
  ];
}

// AttestationGPUReport holds attestation evidence for a single GPU device.
message AttestationGPUReport {
  uint32 device_index = 1 [
    (gogoproto.jsontag)  = "device_index",
    (gogoproto.moretags) = "yaml:\"device_index\""
  ];

  // Base64-encoded hardware-signed GPU attestation report.
  string report = 2 [
    (gogoproto.jsontag)  = "report",
    (gogoproto.moretags) = "yaml:\"report\""
  ];
}

// AttestationQuoteResponse is the response from the AttestationQuote RPC method.
// Contains raw hardware-signed attestation evidence from the TEE sidecar.
// The provider never inspects or modifies any field.
message AttestationQuoteResponse {
  // Base64-encoded CPU attestation report (SNP ~1184 bytes, TDX ~5243 bytes).
  string report = 1 [
    (gogoproto.jsontag)  = "report",
    (gogoproto.moretags) = "yaml:\"report\""
  ];

  // Base64-encoded certificate chain (may be empty).
  string cert_chain = 2 [
    (gogoproto.jsontag)  = "cert_chain",
    (gogoproto.moretags) = "yaml:\"cert_chain\""
  ];

  // TEE type identifier: "snp", "tdx", "snp-gpu", "tdx-gpu".
  string tee_type = 3 [
    (gogoproto.jsontag)  = "tee_type",
    (gogoproto.moretags) = "yaml:\"tee_type\""
  ];

  // Base64-encoded auxiliary blob (typically empty).
  string auxblob = 4 [
    (gogoproto.jsontag)  = "auxblob",
    (gogoproto.moretags) = "yaml:\"auxblob\""
  ];

  // Per-device GPU attestation reports for all CC-capable GPUs.
  repeated AttestationGPUReport gpu_reports = 5 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "gpu_reports",
    (gogoproto.moretags) = "yaml:\"gpu_reports\""
  ];

  // Whether report_data was computed with TLS channel binding.
  bool tls_bound = 6 [
    (gogoproto.jsontag)  = "tls_bound",
    (gogoproto.moretags) = "yaml:\"tls_bound\""
  ];
}

// LeaseRPC defines the RPC server for lease control
service LeaseRPC {
  // SendManifest sends manifest to the provider
  rpc SendManifest(SendManifestRequest) returns (SendManifestResponse);

  // ServiceStatus
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  rpc ServiceStatus(ServiceStatusRequest) returns (ServiceStatusResponse);

  // StreamServiceStatus
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  rpc StreamServiceStatus(ServiceStatusRequest) returns (stream ServiceStatusResponse);

  // ServiceLogs
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  rpc ServiceLogs(ServiceLogsRequest) returns (ServiceLogsResponse);

  // StreamServiceLogs
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  rpc StreamServiceLogs(ServiceLogsRequest) returns (stream ServiceLogsResponse);

  // AttestationQuote requests hardware-signed attestation evidence from the
  // confidential compute sidecar. The provider forwards the tenant's nonce
  // to the sidecar and returns the hardware-signed quote verbatim.
  rpc AttestationQuote(AttestationQuoteRequest) returns (AttestationQuoteResponse) {
    option (google.api.http) = {
      post: "/v1/lease/attestation/quote"
      body: "*"
      response_body: "*"
    };
  }
}
