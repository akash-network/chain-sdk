syntax = "proto3";
package akash.inventory.v1;

import "gogoproto/gogo.proto";
import "akash/inventory/v1/resources.proto";

option go_package = "pkg.akt.dev/go/inventory/v1";

// NodeCapabilities extended list of node capabilities
message NodeCapabilities {
  repeated string storage_classes = 1 [
    (gogoproto.customname)   = "StorageClasses",
    (gogoproto.jsontag)      = "storage_classes",
    (gogoproto.moretags)     = "yaml:\"storage_classes\""
  ];

  // Kubernetes extended-resource name the cluster's device plugin publishes
  // for GPU interconnect HCAs (e.g. rdma/rdma_shared_device_ib for an
  // InfiniBand fabric, rdma/rdma_shared_device_eth for RoCE). The
  // `rdma/*` prefix is the device-plugin's own convention (Mellanox/NVIDIA)
  // and stays unchanged here. Empty when the node has no GPU interconnect
  // capability. Discovered by the inventory operator from k8s allocatable.
  string interconnect_resource_name = 2 [
    (gogoproto.customname)   = "InterconnectResourceName",
    (gogoproto.jsontag)      = "interconnect_resource_name,omitempty",
    (gogoproto.moretags)     = "yaml:\"interconnect_resource_name,omitempty\""
  ];

  // GPU interconnect fabric type. "infiniband" or "roce". Internal /
  // informational — the SDL surface is fabric-agnostic; tenants only
  // declare `interconnect: []` or `interconnect: { group: <name> }`.
  // Derived from /sys/class/infiniband/<dev>/ports/1/link_layer on the
  // host node.
  string interconnect_fabric = 3 [
    (gogoproto.customname)   = "InterconnectFabric",
    (gogoproto.jsontag)      = "interconnect_fabric,omitempty",
    (gogoproto.moretags)     = "yaml:\"interconnect_fabric,omitempty\""
  ];

  // NCCL HCA device-name prefixes present on this node, one per distinct
  // family (e.g. ["mlx5"], or ["mlx5","bnxt_re"] on a mixed-vendor host).
  // Same key for IB and RoCE since NCCL uses the IB verbs API for both.
  // Joined with commas and injected as NCCL_IB_HCA when scheduling GPU
  // interconnect workloads — NCCL accepts comma-separated device prefixes
  // natively. Discovered from /sys/class/infiniband/<dev> on the host.
  repeated string nccl_hca_prefixes = 4 [
    (gogoproto.customname)   = "NCCLHCAPrefixes",
    (gogoproto.jsontag)      = "nccl_hca_prefixes,omitempty",
    (gogoproto.moretags)     = "yaml:\"nccl_hca_prefixes,omitempty\""
  ];
}

// Node reports node inventory details
message Node {
  string name = 1 [
    (gogoproto.customname)   = "Name",
    (gogoproto.jsontag)      = "name",
    (gogoproto.moretags)     = "yaml:\"name\""
  ];

  NodeResources resources = 2 [
    (gogoproto.nullable)     = false,
    (gogoproto.customname)   = "Resources",
    (gogoproto.jsontag)      = "resources",
    (gogoproto.moretags)     = "yaml:\"resources\""
  ];

  NodeCapabilities capabilities = 3 [
    (gogoproto.nullable)     = false,
    (gogoproto.customname)   = "Capabilities",
    (gogoproto.jsontag)      = "capabilities",
    (gogoproto.moretags)     = "yaml:\"capabilities\""
  ];
}
