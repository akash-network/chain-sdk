syntax = "proto3";
package akash.market.v1beta5;

import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";
import "google/protobuf/duration.proto";

option go_package = "pkg.akt.dev/go/node/market/v1beta5";

// Params is the params for the x/market module.
message Params {
  // BidMinDeposit is a parameter for the minimum deposit on a Bid.
  // Deprecated: use BidMinDeposits
  cosmos.base.v1beta1.Coin bid_min_deposit = 1 [
    (gogoproto.customname) = "BidMinDeposit",
    (gogoproto.nullable)   = false,
    (gogoproto.jsontag)    = "bid_min_deposit",
    (gogoproto.moretags)   = "yaml:\"bid_min_deposit\""
  ];

  // OrderMaxBids is a parameter for the maximum number of bids in an order.
  uint32 order_max_bids = 2 [
    (gogoproto.customname) = "OrderMaxBids",
    (gogoproto.jsontag)    = "order_max_bids",
    (gogoproto.moretags)   = "yaml:\"order_max_bids\""
  ];

  // BidMinDeposits is a parameter for the minimum deposits per denom on a Bid.
  repeated cosmos.base.v1beta1.Coin bid_min_deposits = 3 [
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (gogoproto.customname)   = "BidMinDeposits",
    (gogoproto.nullable)     = false,
    (gogoproto.jsontag)      = "bid_min_deposits",
    (gogoproto.moretags)     = "yaml:\"bid_min_deposits\""
  ];

  // min_reclamation_window is the minimum reclamation window duration allowed.
  google.protobuf.Duration min_reclamation_window = 4 [
    (gogoproto.nullable)    = false,
    (gogoproto.stdduration) = true,
    (gogoproto.jsontag)     = "min_reclamation_window",
    (gogoproto.moretags)    = "yaml:\"min_reclamation_window\""
  ];

  // max_reclamation_window is the maximum reclamation window duration allowed.
  google.protobuf.Duration max_reclamation_window = 5 [
    (gogoproto.nullable)    = false,
    (gogoproto.stdduration) = true,
    (gogoproto.jsontag)     = "max_reclamation_window",
    (gogoproto.moretags)    = "yaml:\"max_reclamation_window\""
  ];
}
