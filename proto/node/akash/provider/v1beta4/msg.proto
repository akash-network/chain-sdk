syntax = "proto3";
package akash.provider.v1beta4;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "google/protobuf/timestamp.proto";

import "akash/base/attributes/v1/attribute.proto";

import "akash/provider/v1beta4/provider.proto";
import "akash/provider/v1beta4/maintenance.proto";

option go_package = "pkg.akt.dev/go/node/provider/v1beta4";

// MsgCreateProvider defines an SDK message for creating a provider.
message MsgCreateProvider {
  option (gogoproto.equal) = false;
  option (cosmos.msg.v1.signer) = "owner";

  // Owner is the bech32 address of the account of the provider.
  // It is a string representing a valid account address.
  //
  // Example:
  //   "akash1..."
  string owner = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "owner",
    (gogoproto.moretags)  = "yaml:\"owner\""
  ];
  // HostURI is the Uniform Resource Identifier for provider connection.
  // This URI is used to directly connect to the provider to perform tasks such as sending the manifest.
  string host_uri = 2 [
    (gogoproto.customname) = "HostURI",
    (gogoproto.jsontag)    = "host_uri",
    (gogoproto.moretags)   = "yaml:\"host_uri\""
  ];

  // Attributes is a list of arbitrary attribute key-value pairs.
  repeated akash.base.attributes.v1.Attribute attributes = 3 [
    (gogoproto.castrepeated) = "pkg.akt.dev/go/node/types/attributes/v1.Attributes",
    (gogoproto.nullable)     = false,
    (gogoproto.jsontag)      = "attributes",
    (gogoproto.moretags)     = "yaml:\"attributes\""
  ];

  // Info contains additional provider information.
  akash.provider.v1beta4.Info info = 4 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "info",
    (gogoproto.moretags) = "yaml:\"info\""
  ];
}

// MsgCreateProviderResponse defines the Msg/CreateProvider response type.
message MsgCreateProviderResponse {}

// MsgUpdateProvider defines an SDK message for updating a provider
message MsgUpdateProvider {
  option (gogoproto.equal) = false;
  option (cosmos.msg.v1.signer) = "owner";

  string owner    = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "owner",
    (gogoproto.moretags)  = "yaml:\"owner\""
  ];
  string host_uri = 2 [
    (gogoproto.customname) = "HostURI",
    (gogoproto.jsontag)    = "host_uri",
    (gogoproto.moretags)   = "yaml:\"host_uri\""
  ];
  repeated akash.base.attributes.v1.Attribute attributes = 3 [
    (gogoproto.castrepeated) = "pkg.akt.dev/go/node/types/attributes/v1.Attributes",
    (gogoproto.nullable)     = false,
    (gogoproto.jsontag)      = "attributes",
    (gogoproto.moretags)     = "yaml:\"attributes\""
  ];
  akash.provider.v1beta4.Info info = 4 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "info",
    (gogoproto.moretags) = "yaml:\"info\""
  ];
}

// MsgUpdateProviderResponse defines the Msg/UpdateProvider response type.
message MsgUpdateProviderResponse {}

// MsgDeleteProvider defines an SDK message for deleting a provider
message MsgDeleteProvider {
  option (gogoproto.equal) = false;
  option (cosmos.msg.v1.signer) = "owner";

  string owner = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "owner",
    (gogoproto.moretags)  = "yaml:\"owner\""
  ];
}

// MsgDeleteProviderResponse defines the Msg/DeleteProvider response type.
message MsgDeleteProviderResponse {}

// MsgOpenProviderMaintenance opens a maintenance window for a provider.
message MsgOpenProviderMaintenance {
  option (gogoproto.equal)      = false;
  option (cosmos.msg.v1.signer) = "provider";
  option (amino.name)           = "akash/provider/v1beta4/MsgOpenProviderMaintenance";

  // provider is the bech32 address of the provider opening the maintenance
  // window.
  //
  // Example:
  //   "akash1..."
  string provider = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "provider",
    (gogoproto.moretags)  = "yaml:\"provider\""
  ];
  // maintenance_type is the declared category of the window.
  ProviderMaintenanceType maintenance_type = 2 [
    (gogoproto.jsontag)  = "maintenance_type",
    (gogoproto.moretags) = "yaml:\"maintenance_type\""
  ];
  // starts_at is the wall-clock time at which the maintenance window begins.
  google.protobuf.Timestamp starts_at = 3 [
    (gogoproto.stdtime)  = true,
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "starts_at",
    (gogoproto.moretags) = "yaml:\"starts_at\""
  ];
  // expected_ends_at is the wall-clock time at which the provider expects the
  // window to end.
  google.protobuf.Timestamp expected_ends_at = 4 [
    (gogoproto.stdtime)  = true,
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "expected_ends_at",
    (gogoproto.moretags) = "yaml:\"expected_ends_at\""
  ];
  // metadata_hash is an optional, opaque commitment to off-chain explanatory
  // metadata. The chain does not interpret this value.
  bytes metadata_hash = 5 [
    (gogoproto.jsontag)  = "metadata_hash,omitempty",
    (gogoproto.moretags) = "yaml:\"metadata_hash,omitempty\""
  ];
}

// MsgOpenProviderMaintenanceResponse is the response type for
// MsgOpenProviderMaintenance.
message MsgOpenProviderMaintenanceResponse {
  // maintenance_id is the identifier assigned to the maintenance window.
  uint64 maintenance_id = 1 [
    (gogoproto.customname) = "MaintenanceID",
    (gogoproto.jsontag)    = "maintenance_id",
    (gogoproto.moretags)   = "yaml:\"maintenance_id\""
  ];
}

// MsgCloseProviderMaintenance closes an open provider maintenance window.
message MsgCloseProviderMaintenance {
  option (gogoproto.equal)      = false;
  option (cosmos.msg.v1.signer) = "provider";
  option (amino.name)           = "akash/provider/v1beta4/MsgCloseProviderMaintenance";

  // provider is the bech32 address of the provider closing the maintenance
  // window.
  //
  // Example:
  //   "akash1..."
  string provider = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "provider",
    (gogoproto.moretags)  = "yaml:\"provider\""
  ];
  // maintenance_id is the identifier of the record to close.
  uint64 maintenance_id = 2 [
    (gogoproto.customname) = "MaintenanceID",
    (gogoproto.jsontag)    = "maintenance_id",
    (gogoproto.moretags)   = "yaml:\"maintenance_id\""
  ];
}

// MsgCloseProviderMaintenanceResponse is the response type for
// MsgCloseProviderMaintenance.
message MsgCloseProviderMaintenanceResponse {}
