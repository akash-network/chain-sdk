syntax = "proto3";
package akash.provider.v1beta4;

import "cosmos/msg/v1/msg.proto";

import "akash/provider/v1beta4/msg.proto";
import "akash/provider/v1beta4/paramsmsg.proto";

option go_package = "pkg.akt.dev/go/node/provider/v1beta4";

// Msg defines the provider Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CreateProvider defines a method that creates a provider given the proper inputs.
  rpc CreateProvider(MsgCreateProvider) returns (MsgCreateProviderResponse);

  // UpdateProvider defines a method that updates a provider given the proper inputs.
  rpc UpdateProvider(MsgUpdateProvider) returns (MsgUpdateProviderResponse);

  // DeleteProvider defines a method that deletes a provider given the proper inputs.
  rpc DeleteProvider(MsgDeleteProvider) returns (MsgDeleteProviderResponse);

  // OpenProviderMaintenance opens a provider maintenance window.
  rpc OpenProviderMaintenance(MsgOpenProviderMaintenance) returns (MsgOpenProviderMaintenanceResponse);

  // CloseProviderMaintenance closes an open maintenance window.
  rpc CloseProviderMaintenance(MsgCloseProviderMaintenance) returns (MsgCloseProviderMaintenanceResponse);

  // UpdateParams is a governance operation for updating the x/provider
  // parameters.
  //
  // Since: akash v1.0.0
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}
