syntax = "proto3";
package akash.provider.v1beta4;

import "gogoproto/gogo.proto";

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";

import "akash/provider/v1beta4/params.proto";

option go_package = "pkg.akt.dev/go/node/provider/v1beta4";

// MsgUpdateParams is the Msg/UpdateParams request type.
//
// Since: akash v1.0.0
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name)           = "akash/provider/v1beta4/MsgUpdateParams";

  // authority is the address of the governance account.
  string authority = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString"
  ];

  // params defines the x/provider parameters to update.
  ProviderMaintenanceParams params = 2 [
    (gogoproto.nullable) = false
  ];
}

// MsgUpdateParamsResponse is the response type for MsgUpdateParams.
//
// Since: akash v1.0.0
message MsgUpdateParamsResponse {}
