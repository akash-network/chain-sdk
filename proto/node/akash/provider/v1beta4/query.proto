syntax = "proto3";
package akash.provider.v1beta4;

import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";

import "akash/provider/v1beta4/provider.proto";
import "akash/provider/v1beta4/maintenance.proto";
import "akash/provider/v1beta4/params.proto";

option go_package = "pkg.akt.dev/go/node/provider/v1beta4";

// Query defines the gRPC querier service for the provider package.
service Query {
  // Providers queries providers
  rpc Providers(QueryProvidersRequest) returns (QueryProvidersResponse) {
    option (google.api.http).get = "/akash/provider/v1beta4/providers";
  }

  // Provider queries provider details
  rpc Provider(QueryProviderRequest) returns (QueryProviderResponse) {
    option (google.api.http).get = "/akash/provider/v1beta4/providers/{owner}";
  }

  // ProviderMaintenance returns a single maintenance record for a provider,
  // with its derived status at query time.
  rpc ProviderMaintenance(QueryProviderMaintenanceRequest) returns (QueryProviderMaintenanceResponse) {
    option (google.api.http).get = "/akash/provider/v1beta4/providers/{provider}/maintenance/{maintenance_id}";
  }

  // ProviderMaintenances lists maintenance records for a provider, optionally
  // filtered by derived status, with pagination.
  rpc ProviderMaintenances(QueryProviderMaintenancesRequest) returns (QueryProviderMaintenancesResponse) {
    option (google.api.http).get = "/akash/provider/v1beta4/providers/{provider}/maintenance";
  }

  // Params returns the x/provider ProviderMaintenanceParams.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/akash/provider/v1beta4/params";
  }

  // Registration returns the registration record (registered_at timestamp)
  // for a provider. Consumed by x/verification on-chain prerequisite checks.
  rpc Registration(QueryRegistrationRequest) returns (QueryRegistrationResponse) {
    option (google.api.http).get = "/akash/provider/v1beta4/providers/{provider}/registration";
  }
}

// QueryProvidersRequest is request type for the Query/Providers RPC method
message QueryProvidersRequest {
  // Pagination is used to paginate the request.
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryProvidersResponse is response type for the Query/Providers RPC method
message QueryProvidersResponse {
  // Providers is a list of providers on the network.
  repeated Provider providers = 1 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "Providers"
  ];

  // Pagination contains the information about response pagination.
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryProviderRequest is request type for the Query/Provider RPC method
message QueryProviderRequest {
  // Owner is the bech32 address of the account of the provider.
  // It is a string representing a valid account address.
  //
  // Example:
  //   "akash1..."
  string owner = 1;
}

// QueryProviderResponse is response type for the Query/Provider RPC method.
message QueryProviderResponse {
  // Provider holds the representation of a provider on the network.
  Provider provider = 1 [
    (gogoproto.nullable) = false
  ];
}

// QueryProviderMaintenanceRequest is the request type for the
// Query/ProviderMaintenance RPC method.
message QueryProviderMaintenanceRequest {
  // provider is the bech32 address of the provider whose maintenance record
  // is being looked up.
  //
  // Example:
  //   "akash1..."
  string provider = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString"
  ];
  // maintenance_id is the identifier of the maintenance record.
  // No customname: the grpc-gateway expects MaintenanceId (camel-from-snake)
  // because this field is bound to a REST path parameter.
  uint64 maintenance_id = 2;
}

// QueryProviderMaintenanceResponse is the response type for the
// Query/ProviderMaintenance RPC method.
message QueryProviderMaintenanceResponse {
  // maintenance is the requested record paired with its derived status at
  // query time.
  ProviderMaintenanceWithStatus maintenance = 1 [
    (gogoproto.nullable) = false
  ];
}

// QueryProviderMaintenancesRequest is the request type for the
// Query/ProviderMaintenances RPC method.
message QueryProviderMaintenancesRequest {
  // provider is the bech32 address of the provider whose maintenance records
  // are being listed.
  //
  // Example:
  //   "akash1..."
  string provider = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString"
  ];
  // status_filter optionally restricts the results to records that resolve
  // (at query time) to the given derived status. A value of
  // provider_maintenance_status_unspecified disables the filter.
  ProviderMaintenanceStatus status_filter = 2;
  // pagination is used to paginate the request.
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}

// QueryProviderMaintenancesResponse is the response type for the
// Query/ProviderMaintenances RPC method.
message QueryProviderMaintenancesResponse {
  // maintenance is the list of records (with derived statuses) matching the
  // request filter and pagination.
  repeated ProviderMaintenanceWithStatus maintenance = 1 [
    (gogoproto.nullable) = false
  ];
  // pagination contains the information about response pagination.
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryParamsRequest is the request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params defines the parameters of the x/provider module.
  ProviderMaintenanceParams params = 1 [
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];
}

// QueryRegistrationRequest is the request type for the Query/Registration RPC
// method.
message QueryRegistrationRequest {
  // provider is the bech32 address of the provider whose registration record
  // is being looked up.
  //
  // Example:
  //   "akash1..."
  string provider = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString"
  ];
}

// QueryRegistrationResponse is the response type for the Query/Registration
// RPC method.
message QueryRegistrationResponse {
  // registration is the provider registration record, including the
  // registered_at timestamp.
  ProviderRegistration registration = 1 [
    (gogoproto.nullable) = false
  ];
}
