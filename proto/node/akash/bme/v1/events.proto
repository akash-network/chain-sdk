syntax = "proto3";
package akash.bme.v1;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/base/v1beta1/coin.proto";

import "akash/bme/v1/types.proto";

option go_package = "pkg.akt.dev/go/node/bme/v1";

// EventCircuitBreakerStatusChange is emitted when circuit breaker status changes
message EventMintStatusChange {
  // previous_status is the previous status
  MintStatus previous_status = 1;

  // new_status is the new status
  MintStatus new_status = 2;

  // collateral_ratio is the CR that triggered the change
  string collateral_ratio = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

// EventVaultSeeded is emitted when the vault is seeded with AKT
message EventVaultSeeded {
  // amount is the AKT amount added to vault
  cosmos.base.v1beta1.Coin amount = 1 [
    (gogoproto.nullable) = false
  ];

  // source is where the funds came from
  string source = 2;

  // new_vault_balance is the new vault balance
  cosmos.base.v1beta1.Coin new_vault_balance = 3 [
    (gogoproto.nullable) = false
  ];
}

// EventLedgerRecordExecuted emitted information of burn/mint event of token A burn to mint token B
message EventLedgerRecordExecuted {
  // burned_from source address of the tokens burned
  LedgerRecordID id = 1 [
    (gogoproto.nullable)  = false,
    (gogoproto.customname) = "ID",
    (gogoproto.jsontag)   = "id",
    (gogoproto.moretags)  = "yaml:\"id\""
  ];

  // burned_from source address of the tokens burned
  string burned_from = 2 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "burned_from",
    (gogoproto.moretags)  = "yaml:\"burned_from\""
  ];

  // minted_to destination address of the tokens minted
  string minted_to = 3 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "minted_to",
    (gogoproto.moretags)  = "yaml:\"minted_to\""
  ];

  // module is module account performing burn
  string burner = 4 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "burner",
    (gogoproto.moretags)  = "yaml:\"burner\""
  ];

  // module is module account performing mint
  string minter = 5 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "minter",
    (gogoproto.moretags)  = "yaml:\"minter\""
  ];

  // burned is the coin burned at price
  CoinPrice burned = 6 [
    (gogoproto.nullable) = true,
    (gogoproto.jsontag)  = "burned",
    (gogoproto.moretags) = "yaml:\"burned\""
  ];

  // minted is coin minted at price
  CoinPrice minted = 7 [
    (gogoproto.nullable) = true,
    (gogoproto.jsontag)  = "minted",
    (gogoproto.moretags) = "yaml:\"minted\""
  ];

  cosmos.base.v1beta1.Coin spread = 8 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag)  = "spread",
    (gogoproto.moretags) = "yaml:\"spread\""
  ];

  CoinPrice remint_credit_issued = 9 [
    (gogoproto.nullable) = true,
    (gogoproto.jsontag)  = "remint_credit_issued",
    (gogoproto.moretags) = "yaml:\"remint_credit_issued\""
  ];

  CoinPrice remint_credit_accrued = 10 [
    (gogoproto.nullable) = true,
    (gogoproto.jsontag)  = "remint_credit_accrued",
    (gogoproto.moretags) = "yaml:\"remint_credit_accrued\""
  ];
}

// EventLedgerRecordCanceled emitted information of unsuccessful burn/mint event
message EventLedgerRecordCanceled {
  // burned_from source address of the tokens burned
  LedgerRecordID id = 1 [
    (gogoproto.nullable)  = false,
    (gogoproto.customname) = "ID",
    (gogoproto.jsontag)   = "id",
    (gogoproto.moretags)  = "yaml:\"id\""
  ];

  // fail_reason
  LedgerCanceledRecord.BMCancelReason cancel_reason = 2 [
    (gogoproto.jsontag)   = "cancel_reason",
    (gogoproto.moretags)  = "yaml:\"cancel_reason\""
  ];

  // owner source of the coins to be burned
  string owner = 3 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "owner",
    (gogoproto.moretags)  = "yaml:\"owner\""
  ];

  // to destination of the minted coins.
  // if minted coin is ACT, "to" must be same as signer
  string to = 4 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag)   = "to",
    (gogoproto.moretags)  = "yaml:\"to\""
  ];

  // coins_to_burn
  cosmos.base.v1beta1.Coin coins_to_burn = 5 [
    (gogoproto.nullable)   = false,
    (gogoproto.customname) = "CoinsToBurn",
    (gogoproto.jsontag)    = "coins_to_burn",
    (gogoproto.moretags)   = "yaml:\"coins_to_burn\""
  ];

  // denom_to_mint
  string denom_to_mint = 6 [
    (gogoproto.customname) = "DenomToMint",
    (gogoproto.jsontag)    = "denom_to_mint",
    (gogoproto.moretags)   = "yaml:\"denom_to_mint\""
  ];
}
